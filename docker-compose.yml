services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: fleet-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -W 2 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: fleet-simulator
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      DEVICE_ID: device-001
      RATE_HZ: "10"
    # Week 3: scale via `docker compose up --scale simulator=50`
    # (will need to drop container_name and randomize DEVICE_ID per replica)

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: fleet-timescaledb
    environment:
      POSTGRES_DB: fleet
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
    ports:
      - "5432:5432"
    volumes:
      - ./config/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet"]
      interval: 10s
      timeout: 5s
      retries: 5

  subscriber:
    build:
      context: .
      dockerfile: Dockerfile.subscriber
    container_name: fleet-subscriber
    depends_on:
      mosquitto:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_DB: fleet
      PG_USER: fleet
      PG_PASSWORD: fleet
      BATCH_SIZE: "500"
      FLUSH_INTERVAL_S: "1.0"

volumes:
  timescale_data:
