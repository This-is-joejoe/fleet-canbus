services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: fleet-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -W 2 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: fleet-simulator
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      DEVICE_ID: device-001
      RATE_HZ: "10"
    # Week 3: scale via `docker compose up --scale simulator=50`
    # (will need to drop container_name and randomize DEVICE_ID per replica)
