services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: fleet-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -W 2 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    # No container_name / DEVICE_ID: each replica gets a unique docker hostname,
    # from which the simulator derives its own device id. Scale the fleet with:
    #   docker compose up --scale simulator=50
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      RATE_HZ: "10"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: fleet-timescaledb
    environment:
      POSTGRES_DB: fleet
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
    ports:
      - "5432:5432"
    volumes:
      - ./config/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet"]
      interval: 10s
      timeout: 5s
      retries: 5

  subscriber:
    build:
      context: .
      dockerfile: Dockerfile.subscriber
    container_name: fleet-subscriber
    depends_on:
      mosquitto:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_DB: fleet
      PG_USER: fleet
      PG_PASSWORD: fleet
      BATCH_SIZE: "500"
      FLUSH_INTERVAL_S: "1.0"
    expose:
      - "8000"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: fleet-prometheus
    depends_on:
      - subscriber
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:10.4.2
    container_name: fleet-grafana
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

volumes:
  timescale_data:
  grafana_data:
  prometheus_data:
