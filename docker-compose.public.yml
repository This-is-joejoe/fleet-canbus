# docker-compose.public.yml — hardened public deployment (Oracle Cloud ARM).
#
# Standalone (use ALONE, not as an override on docker-compose.yml) so the dev
# file's host-published ports (5432/9090/1883) can never leak to the internet.
#
#   docker compose -f docker-compose.public.yml up -d --build
#
# Only Caddy publishes host ports (80/443). Everything else is reachable only on
# the internal Docker network. Secrets come from a local .env (NOT committed):
#   SITE_ADDRESS=your-name.duckdns.org
#   GF_ADMIN_PASSWORD=<a strong password>
services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: fleet-mosquitto
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -W 2 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    # Small always-on fleet: 6 devices at 10 Hz = 60 msg/s. Trivial load, and
    # retention policies (raw 7d) keep disk bounded so the free box runs forever.
    deploy:
      replicas: 6
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      RATE_HZ: "10"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: fleet-timescaledb
    environment:
      POSTGRES_DB: fleet
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet   # internal network only; never published to host
    volumes:
      - ./config/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet"]
      interval: 10s
      timeout: 5s
      retries: 5

  subscriber:
    build:
      context: .
      dockerfile: Dockerfile.subscriber
    container_name: fleet-subscriber
    depends_on:
      mosquitto:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_DB: fleet
      PG_USER: fleet
      PG_PASSWORD: fleet
      BATCH_SIZE: "500"
      FLUSH_INTERVAL_S: "1.0"
    expose:
      - "8000"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: fleet-prometheus
    depends_on:
      - subscriber
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:10.4.2
    container_name: fleet-grafana
    depends_on:
      timescaledb:
        condition: service_healthy
    # No host ports: only Caddy (same Docker network) reaches grafana:3000.
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?set GF_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_ANONYMOUS_HIDE_VERSION: "true"
      GF_SERVER_ROOT_URL: https://${SITE_ADDRESS:?set SITE_ADDRESS in .env}
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

  caddy:
    image: caddy:2
    container_name: fleet-caddy
    depends_on:
      - grafana
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?set SITE_ADDRESS in .env}
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  timescale_data:
  grafana_data:
  prometheus_data:
  mosquitto_data:
  caddy_data:
  caddy_config:
