name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mosquitto:
        image: eclipse-mosquitto:2
        ports:
          - 1883:1883
        options: >-
          --health-cmd "mosquitto_sub -t '$SYS/#' -C 1 -W 2 || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Test (unit)
        run: pytest -m "not integration" --cov=fleet_canbus --cov=fleet_subscriber --cov-report=term-missing

      - name: Test (integration)
        env:
          MQTT_HOST: localhost
          MQTT_PORT: "1883"
        run: pytest -m integration -v
